name: 更新世界杯数据

on:
  schedule:
    # 每天北京时间中午12点 (UTC 4:00)
    - cron: '0 4 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 抓取最新比赛数据
        id: fetch
        run: |
          pip install requests beautifulsoup4
          python update_worldcup.py

      - name: 提交更新
        run: |
          git config user.name "World Cup Bot"
          git config user.email "bot@worldcup2026.local"
          git add data.js
          if git diff --cached --quiet; then
            echo "没有更新"
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            git commit -m "自动更新：$(date '+%Y-%m-%d %H:%M') 北京时间"
            git push
            echo "updated=true" >> $GITHUB_OUTPUT
          fi
